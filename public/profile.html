<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spill The Tea - Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-soft">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <main class="page-center">
    <section class="simple-panel">
      <div class="panel-top">
        <div>
          <div class="brand-pill">Profile</div>
          <h2>Your profile</h2>
        </div>
        <a href="chat.html" class="secondary-btn link-btn">Back to Chat</a>
      </div>

      <div class="profile-page-card">
        <div class="profile-avatar xl-avatar" id="profilePageAvatar">Y</div>
        <h2 id="profilePageName">You</h2>
        <p id="profilePageStatus">soft girl era</p>

        <div class="profile-stats">
          <div class="stat-box">
            <span>Theme</span>
            <strong id="profilePageTheme">Soft Pink</strong>
          </div>
          <div class="stat-box">
            <span>Saved Messages</span>
            <strong id="profilePageMessageCount">0</strong>
          </div>
        </div>

        <div class="profile-actions">
          <a href="settings.html" class="primary-btn link-btn">Edit Profile</a>
          <a href="chat.html" class="secondary-btn link-btn">Go to Chat</a>
          <button id="logoutProfileBtn" class="logout-btn wide-btn" type="button">
            Log Out
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
